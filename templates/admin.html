<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChipChat | Admin Control Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body { background: #0d1117; color: #00ff41; font-family: 'Courier New', Courier, monospace; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* Auth Cards */
        .admin-auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #161b22; border: 1px solid #30363d; padding: 30px; border-radius: 10px; width: 400px; color: white; }
        .auth-card input { background: #0d1117; border: 1px solid #30363d; color: #00ff41; margin-bottom: 15px; }
        .auth-card input:focus { background: #0d1117; color: #00ff41; border-color: #00ff41; box-shadow: none; }

        /* Monitor UI */
        .log-container { background: #000; border: 1px solid #333; height: 70vh; overflow-y: auto; padding: 20px; border-radius: 10px; margin-bottom: 20px; margin-top: 20px; box-shadow: inset 0 0 10px #00ff4133; }
        .log-entry { border-bottom: 1px solid #1a1a1a; padding: 10px 0; font-size: 13px; line-height: 1.6; }
        .timestamp { color: #888; margin-right: 10px; }
        .ciphertext { color: #ff003c; word-break: break-all; background: #1a0005; padding: 10px; border-radius: 5px; display: block; margin-top: 5px; }
        
        @media print { .no-print { display: none; } body { background: white; color: black; } .log-container { height: auto; border: none; } }
    </style>
</head>
<body>

<!-- AUTHENTICATION SECTION -->
<div id="admin-auth" class="admin-auth-container">
    <!-- Login Card -->
    <div id="admin-login-card" class="auth-card shadow">
        <h3 class="text-center mb-4">Admin Login</h3>
        <input type="text" id="admin-id" class="form-control" placeholder="Admin ID" onkeypress="if(event.key==='Enter') handleAdminAuth('login')">
        <input type="password" id="admin-pass" class="form-control" placeholder="Password" onkeypress="if(event.key==='Enter') handleAdminAuth('login')">
        <button onclick="handleAdminAuth('login')" class="btn btn-success w-100 mb-3"> Authorize </button>
        <p class="text-center small"> First time? <a href="#" onclick="toggleAuth('signup')" class="text-success"> Register System Admin</a></p>
    </div>

    <!-- Register Card -->
    <div id="admin-signup-card" class="auth-card shadow hidden">
        <h3 class="text-center mb-4">System Registration</h3>

        <input type="text" id="reg-admin-id" class="form-control" placeholder="New Admin ID" minlength="4"required>
        <input type="password" id="reg-admin-pass" class="form-control" placeholder="New Password"
        minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&._-])[A-Za-z\d@$!%*?&._-]{8,}$"
        title="Password must be at least 8 characters, including one uppercase letter, one lowercase letter, one number, and one special character (@$!%*?&._-)." required>
        <input type="password" id="reg-admin-confirm" class="form-control" placeholder="Confirm Password" required onkeypress="if(event.key==='Enter') handleAdminAuth('signup')">
        <button onclick="handleAdminAuth('signup')" class="btn btn-primary w-100 mb-3"> Create Admin</button>
        <p class="text-center small"> Have ID? <a href="#" onclick="toggleAuth('login')" class="text-success"> Login </a></p>
    </div>
</div>

<!-- LIVE MONITOR SECTION -->
<div id="admin-monitor" class="container hidden">
    <div class="d-flex justify-content-between align-items-center mt-4 no-print">
        <h2>🛡️ SOC - System Live Monitor</h2>
        <div>
            <button onclick="window.print()" class="btn btn-outline-light">📄 Generate Report (PDF)</button>
            <button onclick="adminLogout()" class="btn btn-outline-danger ms-2">🔒 Logout</button>
        </div>
    </div>

    <div class="log-container" id="admin-logs">
        <div class="log-entry"><span class="timestamp">[SYSTEM]</span> ChipChat Security Operations Center</div>
    </div>

    <div class="card bg-dark text-white p-3 border-secondary no-print">
        <div class="row">
            <div class="col-md-6">
                <span class="text-success">● Server Status: Online</span><br>
            </div>
            <div class="col-md-6 text-end">
                <small class="text-muted">ChipChat Protocol v2.0</small>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();

    function toggleAuth(mode) {
        document.getElementById('admin-login-card').classList.toggle('hidden', mode === 'signup');
        document.getElementById('admin-signup-card').classList.toggle('hidden', mode === 'login');
    }

    async function handleAdminAuth(type) {
        // Correctly get IDs based on which card is visible
        const id = document.getElementById(type === 'login' ? 'admin-id' : 'reg-admin-id').value;
        const pass = document.getElementById(type === 'login' ? 'admin-pass' : 'reg-admin-pass').value;

        if (!id || !pass) return alert("Please fill all fields");

        if(type === 'signup') {
            const confirm = document.getElementById('reg-admin-confirm').value;
            if(pass !== confirm) return alert("Passwords do not match");
        }

        const res = await fetch('/admin_' + (type === 'login' ? 'login' : 'register'), {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: id, password: pass }) // Matches backend data.get('id')
        });

        const data = await res.json();
        if(res.ok) {
            if(type === 'login') {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-monitor').classList.remove('hidden');
                socket.emit('join_admin'); // Join the real-time room
            } else {
                alert("Admin registration successful! Please log in.");
                toggleAuth('login');
            }
        } else {
            alert(data.message);
        }
    }

    socket.on('admin_log', (data) => {
    const logBox = document.getElementById('admin-logs');
    const div = document.createElement('div');
    div.className = 'log-entry';

    const time = new Date().toLocaleTimeString();

    let content = `<span class="timestamp">[${time}]</span> `;
    content += `<span class="badge ${data.type === 'AUTH' ? 'bg-warning' : 'bg-primary'}">${data.type}</span> `;
    content += `<strong>${data.event}</strong>`;

    if (data.type === "MSG") {
        content += `
    <pre class="ciphertext small mt-2">
    🔒 [E2EE PROTOCOL] SECURE MESSAGE RELAY
    DIRECTION    : ${data.details.from}  >>>  ${data.details.to}
    MEDIA TYPE   : ${data.details.mediaType}
    ------------------------------------------------------------
    CIPHERTEXT   : ${data.details.ciphertext.substring(0, 80)}...
    WRAPPED KEY  : ${data.details.wrappedKey.substring(0, 80)}...
    ════════════════════════════════════════════════════════════
    </pre>`;
        } else {
            content += ` - ${data.details}`;
        }

        div.innerHTML = content;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    });

    function adminLogout() { location.reload(); }
</script>
</body>
</html>
